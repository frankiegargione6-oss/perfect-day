<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard · Perfect Day</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body data-page="leaderboard">

  <header class="site-header">
    <a class="back-home" href="/">← Back</a>
    <a class="brand" href="/">Perfect Day</a>
    <button id="siteMenuToggle" class="site-menu-toggle" type="button" aria-label="Open navigation">☰</button>
    <nav class="site-nav">
      <a href="/leaderboard.html" class="nav-link"><span class="nav-icon">📊</span> Leaderboard</a>
      <a href="/daily-challenge.html" class="nav-link"><span class="nav-icon">🗓️</span> Daily Challenge</a>
      <a href="/stats.html" class="nav-link"><span class="nav-icon">🌎</span> Stats</a>
      <a href="/past-games.html" class="nav-link"><span class="nav-icon">🕘</span> Past Games</a>
      <a href="/achievements.html" class="nav-link"><span class="nav-icon">🏆</span> Achievements</a>
      <a href="/friends.html" class="nav-link"><span class="nav-icon">🤝</span> Friends</a>
      <a href="/head-to-head.html" class="nav-link"><span class="nav-icon">⚔️</span> Head-to-Head</a>
    </nav>
    <div class="account-nav">
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
      <div id="navGuest" class="nav-auth">
        <a href="/signup.html" class="nav-button primary">Sign Up</a>
        <a href="/login.html" class="nav-button">Log In</a>
      </div>
      <a id="navUser" href="/profile.html" class="nav-user hidden"><span class="profile-icon">👤</span><span id="navUsername">Profile</span></a>
    </div>
  </header>

  <main class="app slim-app">
    <section class="page-card">
      <div class="page-heading-row">
        <div>
          <p class="eyebrow">Season 2</p>
          <h1 class="page-title"><span class="title-icon">📊</span> Leaderboard</h1>
          <p class="page-subtitle">Season 2 leaderboard using the new weighted scoring system. Old games stay saved in Past Games.</p>
        </div>
        <div class="leaderboard-controls">
          <label for="leaderboardMode">Mode</label>
          <select id="leaderboardMode">
            <option value="All Modes">All Modes</option>
            <option value="Everyday">Everyday</option>
            <option value="Summer">Summer</option>
            <option value="Winter">Winter</option>
            <option value="Beach">Beach</option>
            <option value="Golf">Golf</option>
            <option value="Tailgate">Tailgate</option>
            <option value="Severe Weather">Severe Weather</option>
            <option value="Worst Day">Worst Day</option>
          </select>
        </div>
      </div>
      <div id="leaderboardList" class="data-list">Loading leaderboard...</div>
      <button id="viewMoreLeaderboardBtn" class="secondary leaderboard-more hidden" type="button">View More</button>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-app.js"></script>
</body>
</html>
