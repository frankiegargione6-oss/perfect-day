<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up · Perfect Day</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body data-page="signup">

  <header class="site-header">
    <a class="back-home" href="/">← Back</a>
    <a class="brand" href="/">Perfect Day</a>
    <nav class="site-nav">
      <a href="/leaderboard.html" class="nav-link"><span class="nav-icon">📊</span> Leaderboard</a>
      <a href="/daily-challenge.html" class="nav-link"><span class="nav-icon">🗓️</span> Daily Challenge</a>
      <a href="/past-games.html" class="nav-link"><span class="nav-icon">🕘</span> Past Games</a>
      <a href="/achievements.html" class="nav-link"><span class="nav-icon">🏆</span> Achievements</a>
      <a href="/friends.html" class="nav-link"><span class="nav-icon">🤝</span> Friends</a>
      <a href="/head-to-head.html" class="nav-link"><span class="nav-icon">⚔️</span> Head-to-Head</a>
    </nav>
    <div class="account-nav">
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
      <div id="navGuest" class="nav-auth">
        <a href="/signup.html" class="nav-button primary">Sign Up</a>
        <a href="/login.html" class="nav-button">Log In</a>
      </div>
      <a id="navUser" href="/profile.html" class="nav-user hidden"><span class="profile-icon">👤</span><span id="navUsername">Profile</span></a>
    </div>
  </header>

  <main class="app slim-app">
    <section class="page-card auth-page-card">
      <p class="eyebrow">Account</p>
      <h1 class="page-title">Sign Up</h1>
      <p class="page-subtitle">Create an account to save scores, appear on the leaderboard, and track past games.</p>
      <form id="signupForm" class="stack-form">
        <input id="signupEmail" type="email" placeholder="Email" autocomplete="email" required />
        <input id="signupPassword" type="password" placeholder="Password" autocomplete="new-password" required />
        <input id="signupUsername" type="text" placeholder="Username" autocomplete="nickname" required />
        <button type="submit">Sign Up</button>
      </form>
      <p id="pageStatus" class="page-status"></p>
      <p class="form-footer">Already have an account? <a href="/login.html">Log in</a></p>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-app.js"></script>
</body>
</html>
